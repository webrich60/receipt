
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>領収書・支払い管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background-color: #f3f4f6; overscroll-behavior-y: none; }
    .app-container { max-width: 430px; margin: 0 auto; background-color: #ffffff; height: 100vh; height: 100dvh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); overflow: hidden; }
    .content-area { flex-grow: 1; overflow-y: auto; padding-bottom: 120px; }
    .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    #toast { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease-in-out; z-index: 50; }
    .toast-hidden { transform: translateY(-150%); opacity: 0; } 
    .toast-visible { transform: translateY(0); opacity: 1; }
    
    .nav-item { transition: color 0.2s; } .nav-item.active { color: #4f46e5; font-weight: 700; }
    .spinner { border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%; border-top: 3px solid white; width: 20px; height: 20px; animation: spin 1s linear infinite; }
    .spinner-indigo { border-color: rgba(79, 70, 229, 0.2); border-top-color: #4f46e5; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .progress-bar { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- トースト通知 -->
    <div id="toast" class="absolute top-4 left-4 right-4 bg-gray-900 text-white text-sm font-bold py-4 px-4 rounded-xl shadow-2xl flex items-center gap-3 toast-hidden pointer-events-none">
      <div id="toastIconContainer" class="flex-shrink-0">
        <i data-lucide="info" class="w-6 h-6 text-indigo-300"></i>
      </div>
      <span id="toastMessage" class="leading-snug">メッセージ</span>
    </div>

    <!-- ヘッダー -->
    <header class="bg-indigo-600 text-white h-14 flex items-center justify-between px-4 shrink-0 shadow-sm z-10">
      <div class="w-8"></div>
      <h1 class="font-bold text-base tracking-wider flex items-center gap-2">
        <i data-lucide="wallet" class="w-5 h-5"></i>
        領収書・支払い管理
      </h1>
      <button onclick="switchTab('settings')" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-indigo-500 active:scale-90 transition-all">
        <i data-lucide="settings" class="w-5 h-5"></i>
      </button>
    </header>

    <main class="content-area no-scrollbar bg-gray-50">
      
      <!-- ================= スキャン画面 ================= -->
      <section id="tab-scan" class="p-4 min-h-full flex flex-col">
        <div id="dropZone" class="flex-grow flex flex-col justify-center gap-4 py-8">
          <button id="cameraBtn" class="w-full bg-white border-2 border-indigo-100 rounded-2xl p-8 flex flex-col items-center justify-center gap-3 shadow-sm hover:border-indigo-400 hover:bg-indigo-50 transition-all active:scale-95">
            <div class="bg-indigo-100 p-4 rounded-full"><i data-lucide="camera" class="w-10 h-10 text-indigo-600"></i></div>
            <span class="font-bold text-indigo-900">カメラで撮影して読み込む</span>
          </button>
          
          <div class="flex items-center gap-4 my-2">
            <div class="h-px bg-gray-200 flex-grow"></div>
            <span class="text-xs text-gray-400 font-medium">または</span>
            <div class="h-px bg-gray-200 flex-grow"></div>
          </div>

          <button id="galleryBtn" class="w-full bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-center gap-2 shadow-sm hover:bg-gray-50 transition-all active:scale-95 text-gray-600">
            <i data-lucide="image" class="w-5 h-5"></i>
            <span class="text-sm font-medium">スマホ内の画像を選ぶ</span>
          </button>

          <!-- 手動入力ボタン -->
          <div class="flex items-center gap-4 mt-4 mb-2">
            <div class="h-px bg-gray-200 flex-grow"></div>
            <span class="text-xs text-gray-400 font-medium">紛失時など</span>
            <div class="h-px bg-gray-200 flex-grow"></div>
          </div>
          <button id="showManualEntryBtn" class="w-full bg-gray-100 border border-gray-200 rounded-xl p-4 flex items-center justify-center gap-2 shadow-sm hover:bg-gray-200 transition-all active:scale-95 text-gray-600">
            <i data-lucide="edit-3" class="w-5 h-5"></i>
            <span class="text-sm font-medium">画像なしで手動で入力する</span>
          </button>

          <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
          <input type="file" id="fileInput" accept="image/*" class="hidden">
        </div>

        <!-- AI解析用のプレビューエリア -->
        <div id="previewArea" class="hidden pb-8">
          <div class="relative rounded-2xl overflow-hidden shadow-sm border border-gray-200 bg-gray-100 mb-6">
            <img id="imagePreview" src="" alt="プレビュー" class="w-full h-56 object-contain">
            <button id="clearBtn" class="absolute top-3 right-3 bg-gray-900 bg-opacity-60 text-white p-2 rounded-full backdrop-blur-sm active:scale-90 transition-transform"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
          
          <h3 class="text-sm font-bold text-gray-800 mb-3 px-1">手動補正（必要な場合のみ）</h3>
          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 space-y-4 mb-8">
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">書類の種類</label>
              <select id="typeInput" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow">
                <option value="">AIに自動判定させる</option><option value="領収書">領収書・レシート</option><option value="医療費">医療費の領収書</option><option value="書類">その他の書類・メモ</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">日付</label>
              <input type="date" id="dateInput" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">患者名 (医療費の場合のみ)</label>
              <input type="text" id="patientInput" placeholder="例: 山田 太郎" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">カテゴリ</label>
              <select id="categoryInput" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow">
                <option value="">AIに自動判定させる</option>
                <optgroup label="一般"><option value="消耗品費">消耗品費</option><option value="交通費">交通費</option><option value="通信費">通信費</option><option value="接待交際費">接待交際費</option><option value="その他">その他</option></optgroup>
                <optgroup label="医療費"><option value="診療・治療">診療・治療</option><option value="医薬品購入">医薬品購入</option></optgroup>
              </select>
            </div>
          </div>
          <button id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-indigo-500/30 hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-2">
            <i data-lucide="sparkles" class="w-5 h-5"></i><span>AIでデータを読み取る</span>
          </button>
        </div>

        <!-- 手動入力エリア -->
        <div id="manualEntryArea" class="hidden pb-8 mt-4">
          <div class="flex items-center justify-between mb-4 px-1">
            <div class="flex items-center gap-2 text-gray-800">
              <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600"><i data-lucide="edit-3" class="w-5 h-5"></i></div>
              <h3 class="text-sm font-bold">手動でデータを入力</h3>
            </div>
            <button id="cancelManualBtn" class="text-xs text-gray-500 bg-gray-200 px-3 py-1.5 rounded-full font-bold active:scale-95">キャンセル</button>
          </div>

          <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-4 mb-6">
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">種類 <span class="text-red-500">*</span></label>
              <select id="manualTypeSelect" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="領収書">領収書・レシート (一般用)</option>
                <option value="医療費">医療費の領収書 (医療費用)</option>
                <option value="書類">その他の書類 (一般用)</option>
              </select>
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">日付 <span class="text-red-500">*</span></label>
              <input type="date" id="manualDateOnlyInput" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">支払先・店舗名 <span class="text-red-500">*</span></label>
              <input type="text" id="manualStoreInput" placeholder="例: セブンイレブン" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div id="manualPatientContainer" class="hidden">
              <label class="text-xs font-bold text-gray-500 mb-1 block">患者名</label>
              <input type="text" id="manualPatientNameInput" placeholder="例: 山田 太郎" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">金額 (円) <span class="text-red-500">*</span></label>
              <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">¥</span>
                <input type="number" id="manualAmountInput" placeholder="0" class="w-full pl-8 p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-gray-800">
              </div>
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">カテゴリ <span class="text-red-500">*</span></label>
              <select id="manualCategorySelect" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <optgroup label="一般"><option value="消耗品費">消耗品費</option><option value="交通費">交通費</option><option value="通信費">通信費</option><option value="接待交際費">接待交際費</option><option value="その他">その他</option></optgroup>
                <optgroup label="医療費"><option value="診療・治療">診療・治療</option><option value="医薬品購入">医薬品購入</option></optgroup>
              </select>
            </div>
            <div>
              <label class="text-xs font-bold text-gray-500 mb-1 block">品目・詳細</label>
              <input type="text" id="manualItemsInput" placeholder="例: コピー用紙、ペン" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
          </div>
          
          <button id="submitManualDataBtn" class="w-full bg-indigo-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-indigo-500/30 hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-2">
            <i data-lucide="save" class="w-5 h-5"></i><span>シートに保存する</span>
          </button>
        </div>

        <div id="resultArea" class="hidden">
          <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center mb-6 mt-4">
            <div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check" class="w-8 h-8"></i></div>
            <h2 class="text-lg font-bold text-gray-800 mb-1">スプレッドシートに保存しました</h2>
            <p class="text-xs text-gray-500 mb-6">自動で振り分けられました</p>
            <button id="resetBtn" class="w-full bg-gray-100 text-gray-700 font-bold py-3.5 px-4 rounded-xl hover:bg-gray-200 active:scale-95 transition-all">続けて入力する</button>
          </div>
        </div>
      </section>

      <!-- ================= 履歴・ダッシュボード画面 ================= -->
      <section id="tab-history" class="p-4 hidden min-h-full flex flex-col">
        
        <!-- 今月の支出ダッシュボード -->
        <div class="bg-indigo-600 rounded-3xl p-5 mb-4 text-white shadow-xl shadow-indigo-200/50 relative overflow-hidden">
          <div class="absolute -right-4 -top-4 w-24 h-24 bg-indigo-500 rounded-full opacity-50"></div>
          <div class="absolute right-12 -bottom-6 w-16 h-16 bg-indigo-400 rounded-full opacity-20"></div>
          
          <div class="relative z-10">
            <p class="text-[11px] text-indigo-100 font-bold mb-1 flex items-center gap-1"><i data-lucide="pie-chart" class="w-3 h-3"></i> 今月の支出合計</p>
            <div class="text-3xl font-black tracking-tight mb-5" id="summaryTotal">¥0</div>
            
            <div class="grid grid-cols-3 gap-2">
              <div class="bg-indigo-700/50 p-2.5 rounded-2xl border border-indigo-500/30">
                <p class="text-[10px] text-indigo-200 mb-1 font-medium">一般・経費</p>
                <p class="text-sm font-bold truncate" id="summaryGeneral">¥0</p>
              </div>
              <div class="bg-indigo-700/50 p-2.5 rounded-2xl border border-indigo-500/30">
                <p class="text-[10px] text-indigo-200 mb-1 font-medium">医療費</p>
                <p class="text-sm font-bold truncate" id="summaryMedical">¥0</p>
              </div>
              <div class="bg-indigo-700/50 p-2.5 rounded-2xl border border-indigo-500/30">
                <p class="text-[10px] text-indigo-200 mb-1 font-medium">固定支払</p>
                <p class="text-sm font-bold truncate" id="summaryFixed">¥0</p>
              </div>
            </div>
          </div>
        </div>

        <!-- カテゴリ別内訳 -->
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 mb-4">
          <h3 class="text-[11px] font-bold text-gray-500 mb-3 flex items-center gap-1"><i data-lucide="bar-chart-2" class="w-4 h-4"></i> 各項目の支出内訳</h3>
          <div id="categoryBreakdownList" class="space-y-3">
             <p class="text-xs text-gray-400 text-center py-2">データがありません</p>
          </div>
        </div>

        <!-- AI税理士アドバイス -->
        <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-6 shadow-sm relative overflow-hidden">
          <div class="flex items-center gap-2 mb-3">
            <div class="bg-indigo-600 p-1.5 rounded-lg text-white"><i data-lucide="bot" class="w-4 h-4"></i></div>
            <h3 class="text-xs font-bold text-indigo-900">AI税理士の支出アドバイス</h3>
          </div>
          
          <div id="aiAdviceContent" class="text-sm text-gray-700 leading-relaxed mb-3 hidden bg-white p-4 rounded-xl border border-indigo-100 shadow-inner">
            <!-- アドバイス文がここに挿入される -->
          </div>
          
          <div class="flex gap-2">
            <button id="getAiAdviceBtn" class="flex-1 bg-white text-indigo-600 font-bold py-2.5 px-3 rounded-xl text-xs border border-indigo-200 hover:bg-indigo-100 active:scale-95 transition-all flex justify-center items-center gap-1.5">
              <i data-lucide="sparkles" class="w-4 h-4"></i> ワンポイント分析
            </button>
            <button id="getAiAdviceDetailBtn" class="hidden flex-1 bg-indigo-600 text-white font-bold py-2.5 px-3 rounded-xl text-xs shadow-sm shadow-indigo-500/30 hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-1.5">
              <i data-lucide="search" class="w-4 h-4"></i> 詳細なプロの分析
            </button>
          </div>
        </div>

        <div class="flex justify-between items-center mb-3 px-1">
          <h2 class="text-sm font-bold text-gray-800">最近の登録データ</h2>
          <button id="refreshHistoryBtn" class="flex items-center gap-1 text-xs text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full font-medium active:scale-95 transition-transform"><i data-lucide="refresh-cw" class="w-3 h-3"></i> 更新</button>
        </div>
        <div id="historyList" class="space-y-3 pb-8"></div>
        <div id="historyLoading" class="hidden flex-col items-center justify-center text-gray-400 gap-3 py-20"><div class="spinner spinner-indigo"></div><span class="text-xs font-medium tracking-wider">読み込み中...</span></div>
        <div id="historyEmpty" class="hidden flex-col items-center justify-center text-gray-400 py-20"><div class="bg-gray-100 p-4 rounded-full mb-3"><i data-lucide="inbox" class="w-8 h-8 text-gray-300"></i></div><p class="text-sm font-medium">履歴がありません</p></div>
      </section>

      <!-- ================= 毎月の支払画面 ================= -->
      <section id="tab-monthly" class="p-4 hidden min-h-full flex flex-col">
        <div class="mb-4 px-1 flex items-center gap-2 text-gray-800">
          <div class="bg-indigo-100 p-2 rounded-lg text-indigo-600"><i data-lucide="calendar-clock" class="w-5 h-5"></i></div>
          <h2 class="text-sm font-bold">毎月の支払（固定費）登録</h2>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 space-y-5">
          <div>
            <label class="text-xs font-bold text-gray-500 mb-1 block">支払項目</label>
            <div class="flex gap-2">
              <select id="monthlyItemSelect" class="flex-grow p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow">
                <!-- JSで動的に追加 -->
              </select>
              <button type="button" id="deleteItemBtn" title="選択した項目を削除" class="hidden bg-red-50 text-red-500 px-3 py-2 rounded-xl border border-red-100 hover:bg-red-100 active:scale-95 transition-all flex items-center justify-center">
                <i data-lucide="trash-2" class="w-5 h-5"></i>
              </button>
            </div>
          </div>
          <div id="newMonthlyItemContainer" class="hidden pl-4 border-l-2 border-indigo-200 mt-1">
            <label class="text-xs font-bold text-indigo-600 mb-1 block">新しい項目名を入力</label>
            <div class="flex gap-2">
              <input type="text" id="newMonthlyItemInput" placeholder="例: サブスク代" class="flex-grow p-3 text-sm bg-indigo-50 border border-indigo-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <button type="button" id="addNewItemBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-indigo-700 active:scale-95 transition-all whitespace-nowrap">リストに追加</button>
            </div>
            <p class="text-[10px] text-gray-400 mt-1">※今回だけの場合は「リストに追加」を押さずに下の金額を入れて保存してください。</p>
          </div>
          <div id="subItemContainer" class="hidden pl-4 border-l-2 border-indigo-200">
            <label class="text-xs font-bold text-gray-500 mb-1 block text-indigo-600">借り受け先を選択</label>
            <select id="monthlySubItemInput" class="w-full p-3 text-sm bg-indigo-50 border border-indigo-100 text-indigo-900 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <option value="イオン">イオン</option><option value="ライン">ライン</option><option value="楽天">楽天</option>
            </select>
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 mb-1 block">金額 (円)</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold">¥</span>
              <input type="number" id="monthlyAmountInput" placeholder="0" class="w-full pl-8 p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 font-bold text-gray-800">
            </div>
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 mb-1 block">支払日</label>
            <input type="date" id="monthlyDateInput" class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <button id="submitMonthlyBtn" class="w-full bg-indigo-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-indigo-500/30 hover:bg-indigo-700 active:scale-95 transition-all flex justify-center items-center gap-2 mt-2">
            <i data-lucide="save" class="w-5 h-5"></i><span>固定支払シートに保存する</span>
          </button>
        </div>
        <div id="monthlyResultArea" class="hidden">
           <div class="bg-green-50 p-4 rounded-2xl border border-green-100 text-center mt-4">
             <p class="text-green-600 font-bold text-sm">✓ 固定費を記録しました</p>
             <button onclick="resetMonthlyForm()" class="mt-3 text-xs bg-white text-green-700 px-4 py-2 rounded-lg shadow-sm border border-green-200 active:scale-95">続けて入力</button>
           </div>
        </div>
      </section>

      <!-- ================= 設定画面 ================= -->
      <section id="tab-settings" class="p-4 hidden min-h-full">
        <h2 class="text-sm font-bold text-gray-800 mb-4 px-1">システム設定</h2>
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5">
          <label class="block text-xs font-bold text-gray-500 mb-2 flex items-center gap-1"><i data-lucide="link" class="w-4 h-4 text-indigo-500"></i> GAS連携URL</label>
          <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/..." class="w-full p-3 text-sm bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 mb-4 transition-shadow">
          <button id="saveSettingsBtn" class="w-full bg-gray-800 text-white font-bold py-3 px-4 rounded-xl hover:bg-gray-900 active:scale-95 transition-transform">設定を保存する</button>
        </div>
      </section>

    </main>

    <!-- ================= ボトムナビゲーション ================= -->
    <nav class="absolute bottom-0 w-full h-16 bg-white border-t border-gray-100 flex justify-around items-center px-2 z-20 pb-safe">
      <button onclick="switchTab('scan')" id="nav-scan" class="nav-item active flex flex-col items-center justify-center w-full h-full text-gray-400 gap-1">
        <i data-lucide="camera" class="w-6 h-6"></i><span class="text-[10px]">スキャン</span>
      </button>
      <button onclick="switchTab('history')" id="nav-history" class="nav-item flex flex-col items-center justify-center w-full h-full text-gray-400 gap-1">
        <i data-lucide="list" class="w-6 h-6"></i><span class="text-[10px]">履歴</span>
      </button>
      <button onclick="switchTab('monthly')" id="nav-monthly" class="nav-item flex flex-col items-center justify-center w-full h-full text-gray-400 gap-1">
        <i data-lucide="credit-card" class="w-6 h-6"></i><span class="text-[10px]">固定支払</span>
      </button>
    </nav>
  </div>

  <script>
    lucide.createIcons();

    let currentSummaryData = null; // AIアドバイス用に集計データを保持

    const tabs = { scan: document.getElementById('tab-scan'), history: document.getElementById('tab-history'), settings: document.getElementById('tab-settings'), monthly: document.getElementById('tab-monthly') };
    const navs = { scan: document.getElementById('nav-scan'), history: document.getElementById('nav-history'), monthly: document.getElementById('nav-monthly') };
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toastMessage');
      const iconContainer = document.getElementById('toastIconContainer');
      
      const iconName = isError ? 'alert-circle' : 'check-circle';
      const iconColor = isError ? 'text-red-200' : 'text-indigo-300';
      
      iconContainer.innerHTML = `<i data-lucide="${iconName}" class="w-6 h-6 ${iconColor}"></i>`;
      lucide.createIcons();

      toastMsg.textContent = message; 
      toast.classList.remove('bg-gray-900', 'bg-red-600');
      toast.classList.add(isError ? 'bg-red-600' : 'bg-gray-900');
      
      toast.classList.remove('toast-hidden'); 
      toast.classList.add('toast-visible');
      setTimeout(() => { toast.classList.remove('toast-visible'); toast.classList.add('toast-hidden'); }, 3500);
    }

    window.switchTab = function(tabName) {
      Object.keys(tabs).forEach(key => { tabs[key].classList.add('hidden'); });
      Object.keys(navs).forEach(key => { navs[key].classList.remove('active'); navs[key].classList.replace('text-indigo-600', 'text-gray-400'); });
      tabs[tabName].classList.remove('hidden');
      if(navs[tabName]) { navs[tabName].classList.add('active'); navs[tabName].classList.replace('text-gray-400', 'text-indigo-600'); }
      if (tabName === 'history') loadHistory();
    };

    // ==========================================
    // 手動入力 (画像なし) の処理
    // ==========================================
    const dropZone = document.getElementById('dropZone');
    const manualEntryArea = document.getElementById('manualEntryArea');
    const resultArea = document.getElementById('resultArea');
    const previewArea = document.getElementById('previewArea');

    document.getElementById('showManualEntryBtn').addEventListener('click', () => {
      dropZone.classList.add('hidden'); manualEntryArea.classList.remove('hidden'); document.getElementById('manualDateOnlyInput').valueAsDate = new Date();
    });

    document.getElementById('cancelManualBtn').addEventListener('click', () => {
      manualEntryArea.classList.add('hidden'); dropZone.classList.remove('hidden'); dropZone.classList.add('flex');
    });

    const manualTypeSelect = document.getElementById('manualTypeSelect');
    const manualPatientContainer = document.getElementById('manualPatientContainer');
    manualTypeSelect.addEventListener('change', (e) => {
      if (e.target.value === '医療費') manualPatientContainer.classList.remove('hidden'); else manualPatientContainer.classList.add('hidden');
    });

    document.getElementById('submitManualDataBtn').addEventListener('click', async () => {
      const gasUrl = localStorage.getItem('gasAppUrl');
      if (!gasUrl) { showToast('設定からGASのURLを入力してください', true); switchTab('settings'); return; }

      const mType = manualTypeSelect.value, mDate = document.getElementById('manualDateOnlyInput').value, mStore = document.getElementById('manualStoreInput').value.trim(), mAmount = document.getElementById('manualAmountInput').value, mCategory = document.getElementById('manualCategorySelect').value, mPatient = document.getElementById('manualPatientNameInput').value.trim(), mItems = document.getElementById('manualItemsInput').value.trim();
      if (!mDate || !mStore || !mAmount) { showToast('日付、支払先、金額は必ず入力してください', true); return; }

      const btn = document.getElementById('submitManualDataBtn'); const originalText = btn.innerHTML;
      btn.innerHTML = '<div class="spinner"></div><span class="ml-2">保存中...</span>'; btn.disabled = true;

      try {
        const payload = { action: 'upload_text', data: { type: mType, date: mDate, store: mStore, patientName: mPatient, amount: mAmount, category: mCategory, items: mItems } };
        const response = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        const result = await response.json();
        if (result.success) {
          manualEntryArea.classList.add('hidden'); resultArea.classList.remove('hidden'); showToast('手動入力データを保存しました！');
          document.getElementById('manualStoreInput').value = ''; document.getElementById('manualAmountInput').value = ''; document.getElementById('manualItemsInput').value = ''; document.getElementById('manualPatientNameInput').value = '';
        } else showToast('エラー: ' + (result.error || '不明なエラー'), true);
      } catch (error) { showToast('通信エラーが発生しました。', true); } finally { btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons(); }
    });

    // ==========================================
    // 毎月の支払 (固定費) の処理
    // ==========================================
    const initialDefaultItems = ["家賃", "電話（スマホ・ネット代含む）代金", "飛鳥パソコン代金", "全労災（保険）：自動車保険（2台分）", "借り受け金", "N-BOX代金"];
    let savedMonthlyItems = JSON.parse(localStorage.getItem('appMonthlyItems'));
    if (!savedMonthlyItems) {
      const oldCustomItems = JSON.parse(localStorage.getItem('customMonthlyItems') || '[]');
      savedMonthlyItems = [...new Set([...initialDefaultItems, ...oldCustomItems])];
      localStorage.setItem('appMonthlyItems', JSON.stringify(savedMonthlyItems));
    }

    const monthlyItemSelect = document.getElementById('monthlyItemSelect'), subItemContainer = document.getElementById('subItemContainer'), newMonthlyItemContainer = document.getElementById('newMonthlyItemContainer'), newMonthlyItemInput = document.getElementById('newMonthlyItemInput'), addNewItemBtn = document.getElementById('addNewItemBtn'), deleteItemBtn = document.getElementById('deleteItemBtn');

    function renderMonthlySelect() {
      monthlyItemSelect.innerHTML = '<option value="">選択してください</option>';
      savedMonthlyItems.forEach(item => { const option = document.createElement('option'); option.value = item; option.textContent = item; monthlyItemSelect.appendChild(option); });
      const otherOption = document.createElement('option'); otherOption.value = 'その他'; otherOption.textContent = 'その他 (新しく追加)'; monthlyItemSelect.appendChild(otherOption);
      lucide.createIcons();
    }
    renderMonthlySelect(); 

    monthlyItemSelect.addEventListener('change', (e) => {
      const val = e.target.value;
      if (val === '借り受け金') subItemContainer.classList.remove('hidden'); else subItemContainer.classList.add('hidden');
      if (val === 'その他') { newMonthlyItemContainer.classList.remove('hidden'); newMonthlyItemInput.focus(); } else { newMonthlyItemContainer.classList.add('hidden'); }
      if (val !== '' && val !== 'その他') deleteItemBtn.classList.remove('hidden'); else deleteItemBtn.classList.add('hidden');
    });

    deleteItemBtn.addEventListener('click', () => {
      const valToRemove = monthlyItemSelect.value;
      if (!valToRemove || valToRemove === 'その他') return;
      savedMonthlyItems = savedMonthlyItems.filter(item => item !== valToRemove); localStorage.setItem('appMonthlyItems', JSON.stringify(savedMonthlyItems));
      renderMonthlySelect(); resetMonthlyForm(); showToast('項目を削除しました');
    });

    addNewItemBtn.addEventListener('click', () => {
      const newItem = newMonthlyItemInput.value.trim();
      if (!newItem || newItem === 'その他' || newItem === '借り受け金') return showToast('無効な名前です', true);
      if (!savedMonthlyItems.includes(newItem)) { savedMonthlyItems.push(newItem); localStorage.setItem('appMonthlyItems', JSON.stringify(savedMonthlyItems)); }
      renderMonthlySelect(); monthlyItemSelect.value = newItem; monthlyItemSelect.dispatchEvent(new Event('change')); 
      newMonthlyItemInput.value = ''; showToast('リストに追加しました');
    });

    document.getElementById('monthlyDateInput').valueAsDate = new Date();

    function resetMonthlyForm() {
      monthlyItemSelect.value = ''; monthlyItemSelect.dispatchEvent(new Event('change'));
      document.getElementById('monthlyAmountInput').value = ''; document.getElementById('monthlyResultArea').classList.add('hidden'); document.getElementById('submitMonthlyBtn').disabled = false;
    }

    document.getElementById('submitMonthlyBtn').addEventListener('click', async () => {
      const gasUrl = localStorage.getItem('gasAppUrl');
      if (!gasUrl) { showToast('設定からGASのURLを入力してください', true); switchTab('settings'); return; }

      let itemVal = monthlyItemSelect.value;
      const amountVal = document.getElementById('monthlyAmountInput').value, dateVal = document.getElementById('monthlyDateInput').value;
      
      if (itemVal === 'その他') { const tempItemName = newMonthlyItemInput.value.trim(); if (tempItemName) itemVal = tempItemName; }
      if (!itemVal || itemVal === 'その他' || !amountVal || !dateVal) { showToast('項目、金額、日付を入力してください', true); return; }

      let finalItemName = itemVal, finalStoreName = itemVal; 
      if (itemVal === '借り受け金') finalStoreName = '借り受け金 - ' + document.getElementById('monthlySubItemInput').value;

      const btn = document.getElementById('submitMonthlyBtn'); const originalText = btn.innerHTML;
      btn.innerHTML = '<div class="spinner"></div><span class="ml-2">保存中...</span>'; btn.disabled = true;

      try {
        const payload = { action: 'upload_text', data: { type: '固定支払', date: dateVal, store: finalStoreName, amount: amountVal, category: '固定費', items: finalItemName } };
        const response = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        const result = await response.json();
        if (result.success) { document.getElementById('monthlyResultArea').classList.remove('hidden'); showToast('固定支払を記録しました！'); newMonthlyItemInput.value = ''; } 
        else showToast('エラー: ' + (result.error || '不明なエラー'), true);
      } catch (error) { showToast('通信エラーが発生しました。', true); } finally { btn.innerHTML = originalText; btn.disabled = false; lucide.createIcons(); }
    });

    // ==========================================
    // カメラ撮影・スキャン・履歴機能
    // ==========================================
    const gasUrlInput = document.getElementById('gasUrlInput'), savedGasUrl = localStorage.getItem('gasAppUrl');
    if (savedGasUrl) gasUrlInput.value = savedGasUrl; else switchTab('settings');
    document.getElementById('saveSettingsBtn').addEventListener('click', () => {
      const url = gasUrlInput.value.trim();
      if (url) { localStorage.setItem('gasAppUrl', url); showToast('連携URLを保存しました'); } else showToast('URLを入力してください', true);
    });

    const cameraInput = document.getElementById('cameraInput'), fileInput = document.getElementById('fileInput'), imagePreview = document.getElementById('imagePreview'), submitBtn = document.getElementById('submitBtn');
    let base64Data = null, currentFile = null;

    document.getElementById('cameraBtn').addEventListener('click', () => cameraInput.click());
    document.getElementById('galleryBtn').addEventListener('click', () => fileInput.click());
    cameraInput.addEventListener('change', handleFileChange); fileInput.addEventListener('change', handleFileChange);

    function handleFileChange(e) {
      if (e.target.files.length > 0) {
        currentFile = e.target.files[0];
        if (!currentFile.type.startsWith('image/')) return showToast('画像を選択してください', true);
        const reader = new FileReader();
        reader.onload = (e) => {
          base64Data = e.target.result; imagePreview.src = base64Data;
          dropZone.classList.add('hidden'); resultArea.classList.add('hidden'); previewArea.classList.remove('hidden');
        };
        reader.readAsDataURL(currentFile);
      }
    }

    document.getElementById('clearBtn').addEventListener('click', resetScanForm); document.getElementById('resetBtn').addEventListener('click', resetScanForm);
    function resetScanForm() {
      base64Data = null; currentFile = null; fileInput.value = ''; cameraInput.value = '';
      previewArea.classList.add('hidden'); resultArea.classList.add('hidden'); manualEntryArea.classList.add('hidden');
      dropZone.classList.remove('hidden'); dropZone.classList.add('flex');
    }

    submitBtn.addEventListener('click', async () => {
      const gasUrl = localStorage.getItem('gasAppUrl');
      if (!gasUrl) { showToast('設定タブからGASのURLを入力してください', true); switchTab('settings'); return; }
      if (!base64Data) return;

      const originalText = submitBtn.innerHTML; submitBtn.innerHTML = '<div class="spinner"></div><span class="ml-2">AIが解析中...</span>'; submitBtn.disabled = true; submitBtn.classList.replace('bg-indigo-600', 'bg-indigo-400');

      try {
        const payload = { action: 'upload', image: base64Data.split(',')[1], mimeType: currentFile.type, manualType: document.getElementById('typeInput').value, manualDate: document.getElementById('dateInput').value, manualCategory: document.getElementById('categoryInput').value, manualPatient: document.getElementById('patientInput').value };
        const response = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        const result = await response.json();
        if (result.success) { previewArea.classList.add('hidden'); resultArea.classList.remove('hidden'); showToast('スプレッドシートに保存しました！'); } 
        else showToast('エラー: ' + (result.error || '不明なエラー'), true);
      } catch (error) { showToast('通信エラーが発生しました', true); } finally { submitBtn.innerHTML = originalText; submitBtn.disabled = false; submitBtn.classList.replace('bg-indigo-400', 'bg-indigo-600'); lucide.createIcons(); }
    });

    const historyList = document.getElementById('historyList'), historyLoading = document.getElementById('historyLoading'), historyEmpty = document.getElementById('historyEmpty');
    const categoryBreakdownList = document.getElementById('categoryBreakdownList');
    document.getElementById('refreshHistoryBtn').addEventListener('click', loadHistory);

    async function loadHistory() {
      const gasUrl = localStorage.getItem('gasAppUrl'); if (!gasUrl) return;
      historyList.innerHTML = ''; historyEmpty.classList.add('hidden'); historyLoading.classList.remove('hidden'); historyLoading.classList.add('flex');
      
      // AIアドバイスの表示をリセット
      document.getElementById('aiAdviceContent').classList.add('hidden');
      document.getElementById('getAiAdviceDetailBtn').classList.add('hidden');

      try {
        const response = await fetch(gasUrl, { method: 'POST', body: JSON.stringify({ action: 'getHistory' }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        const result = await response.json();
        historyLoading.classList.add('hidden'); historyLoading.classList.remove('flex');
        
        if (result.success) {
          currentSummaryData = result.summary;

          if (result.summary) {
            document.getElementById('summaryTotal').textContent = '¥' + result.summary.total.toLocaleString();
            document.getElementById('summaryGeneral').textContent = '¥' + result.summary.general.toLocaleString();
            document.getElementById('summaryMedical').textContent = '¥' + result.summary.medical.toLocaleString();
            document.getElementById('summaryFixed').textContent = '¥' + result.summary.fixed.toLocaleString();
            
            categoryBreakdownList.innerHTML = '';
            if (result.summary.categories && Object.keys(result.summary.categories).length > 0) {
              const sortedCats = Object.entries(result.summary.categories).sort((a, b) => b[1] - a[1]);
              
              sortedCats.forEach(([catName, amt]) => {
                if (amt > 0) {
                  const percentage = Math.min(100, Math.max(1, (amt / result.summary.total) * 100));
                  categoryBreakdownList.innerHTML += `
                    <div>
                      <div class="flex justify-between items-end mb-1">
                        <span class="text-[11px] font-bold text-gray-700">${catName}</span>
                        <span class="text-sm font-black text-gray-900 tracking-tight">¥${amt.toLocaleString()}</span>
                      </div>
                      <div class="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
                        <div class="bg-indigo-500 h-2 rounded-full progress-bar" style="width: 0%" data-width="${percentage}%"></div>
                      </div>
                    </div>
                  `;
                }
              });
              
              setTimeout(() => {
                document.querySelectorAll('.progress-bar').forEach(bar => {
                  bar.style.width = bar.getAttribute('data-width');
                });
              }, 50);

            } else {
              categoryBreakdownList.innerHTML = '<p class="text-xs text-gray-400 text-center py-2">今月のデータがありません</p>';
            }
          }

          if (result.data && result.data.length > 0) renderHistory(result.data); 
          else { historyEmpty.classList.remove('hidden'); historyEmpty.classList.add('flex'); }
        }
      } catch (error) { historyLoading.classList.add('hidden'); historyLoading.classList.remove('flex'); showToast('履歴の取得に失敗しました', true); }
    }

    function renderHistory(data) {
      data.forEach(item => {
        let iconName = 'file-text', iconBg = 'bg-gray-100', iconColor = 'text-gray-500';
        if (item.type === '領収書') { iconName = 'receipt'; iconBg = 'bg-indigo-100'; iconColor = 'text-indigo-600'; }
        else if (item.type === '医療費') { iconName = 'stethoscope'; iconBg = 'bg-teal-100'; iconColor = 'text-teal-600'; }
        else if (item.type === '固定支払') { iconName = 'credit-card'; iconBg = 'bg-amber-100'; iconColor = 'text-amber-600'; } 
        
        let amountText = '-'; if (item.amount && !isNaN(item.amount)) amountText = '¥' + Number(item.amount).toLocaleString();

        const card = document.createElement('div');
        card.className = 'bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-2 relative';
        
        const itemsHtml = (item.items && item.items !== '-' && item.items !== '') 
          ? `<p class="text-[11px] text-gray-500 truncate mt-0.5">${item.items}</p>` 
          : '';

        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div class="flex items-center gap-3 w-2/3">
              <div class="p-2.5 ${iconBg} rounded-xl shrink-0"><i data-lucide="${iconName}" class="w-5 h-5 ${iconColor}"></i></div>
              <div class="truncate overflow-hidden w-full">
                <p class="text-[10px] text-gray-400 font-medium tracking-wide mb-0.5">${item.date || '日付不明'}</p>
                <p class="text-sm font-bold text-gray-800 truncate">${item.store || '名称なし'}</p>
                ${itemsHtml}
              </div>
            </div>
            <div class="text-right shrink-0">
              <p class="text-[15px] font-black text-gray-900 tracking-tight">${amountText}</p>
              <div class="mt-1"><span class="text-[9px] px-2 py-0.5 bg-gray-50 text-gray-500 rounded-full border border-gray-200">${item.category || '未分類'}</span></div>
            </div>
          </div>`;
        historyList.appendChild(card);
      });
      lucide.createIcons();
    }

    // ==========================================
    // 新機能: AI税理士によるアドバイス機能
    // ==========================================
    document.getElementById('getAiAdviceBtn').addEventListener('click', () => fetchAiAdvice('ワンポイント'));
    document.getElementById('getAiAdviceDetailBtn').addEventListener('click', () => fetchAiAdvice('詳細'));

    async function fetchAiAdvice(detailLevel) {
      if (!currentSummaryData) return showToast('分析するデータがありません', true);
      const gasUrl = localStorage.getItem('gasAppUrl');
      if (!gasUrl) return showToast('設定からGASのURLを入力してください', true);

      const btnId = detailLevel === '詳細' ? 'getAiAdviceDetailBtn' : 'getAiAdviceBtn';
      const btn = document.getElementById(btnId);
      const originalText = btn.innerHTML;
      
      btn.innerHTML = '<div class="spinner spinner-indigo w-4 h-4 border-2 border-t-2"></div><span class="ml-1">分析中...</span>';
      btn.disabled = true;
      
      const adviceContent = document.getElementById('aiAdviceContent');
      if(adviceContent.classList.contains('hidden')) {
          adviceContent.classList.remove('hidden');
          adviceContent.innerHTML = '<p class="text-indigo-400 text-center text-xs py-3 animate-pulse">AI税理士があなたの帳簿を分析しています...</p>';
      } else {
          adviceContent.innerHTML = '<p class="text-indigo-400 text-center text-xs py-3 animate-pulse">より詳細なプロの分析を行っています...</p>';
      }

      try {
        const payload = { 
            action: 'analyze_spending', 
            summary: currentSummaryData,
            detailLevel: detailLevel
        };
        const response = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
        const result = await response.json();
        
        if (result.success) {
            let formattedAdvice = result.advice.replace(/\n/g, '<br>');
            formattedAdvice = formattedAdvice.replace(/\*\*(.*?)\*\*/g, '<span class="font-bold text-indigo-700">$1</span>');
            adviceContent.innerHTML = formattedAdvice;
            
            if (detailLevel === 'ワンポイント') {
                document.getElementById('getAiAdviceDetailBtn').classList.remove('hidden');
            }
        } else {
            showToast('エラー: ' + (result.error || '不明なエラー'), true);
            adviceContent.innerHTML = '<p class="text-red-500 text-xs py-2">分析に失敗しました。</p>';
        }
      } catch (error) { 
        showToast('通信エラーが発生しました。', true); 
        adviceContent.innerHTML = '<p class="text-red-500 text-xs py-2">通信エラーが発生しました。</p>';
      } finally { 
        btn.innerHTML = originalText; 
        btn.disabled = false; 
        lucide.createIcons(); 
      }
    }
  </script>
</body>
</html>
